services:
  app:
    build: .
    container_name: server
    ports:
      - "9999:9999"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULLMQIP=redis
      - BULLMQPORT=6379
      - MEILI_HOST=http://meilisearch:7700
    depends_on:
      - redis
      - meilisearch
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.2
    container_name: meilisearch-server
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_API_KEY}
    volumes:
      - meilisearchdata:/data
    restart: unless-stopped

volumes:
  redisdata:
  meilisearchdata:
